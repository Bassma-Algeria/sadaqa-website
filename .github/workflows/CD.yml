name: Azure CD

on:
  push:
    branches:
      - master

jobs:  
  cleanup:
    name: Delete Pre Release
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v2
      - 
        name: Get Package Version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@master
      -
        name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      -
        name: Login To ACR
        uses: azure/docker-login@v1
        with:
          login-server: sadaqa.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      -
        name: Delete Pre Release Image
        run: az acr repository delete --name sadaqa --image sadaqa-website:pre-${{ steps.package-version.outputs.current-version }}
      - 
        name: Delete The Pre Release Running Container
        run: az container delete --name sadaqa-pre-website --resource-group sadaqa --yes

  build: 
    name: Build / Push to ACR
    runs-on: ubuntu-latest
    needs: cleanup
    steps:
      -
        name: Checkout
        uses: actions/checkout@v2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - 
        name: Get Package Version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@master
      -
        name: Build The Image
        run: docker build . --tag sadaqa.azurecr.io/sadaqa-website:${{ steps.package-version.outputs.current-version }}
      -
        name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      -
        name: Login To ACR
        uses: azure/docker-login@v1
        with:
          login-server: sadaqa.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      -
        name: Push To ACR
        run: docker push sadaqa.azurecr.io/sadaqa-website:${{ steps.package-version.outputs.current-version }}
  
  deploy:
    name: Deploy to ACI
    runs-on: ubuntu-latest
    needs: build
    steps:
      -
        name: Checkout
        uses: actions/checkout@v2
      -
        name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - 
        name: Get Package Version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@master
      -
        name: Deploy to ACI
        uses: azure/aci-deploy@v1
        with:
          name: sadaqa-website
          resource-group: sadaqa
          dns-name-label: sadaqa
          image: sadaqa.azurecr.io/sadaqa-website:${{ steps.package-version.outputs.current-version }}
          location: 'east us'
          ports: 3000
          registry-username: ${{ secrets.ACR_USERNAME }}
          registry-password: ${{ secrets.ACR_PASSWORD }}
          secure-environment-variables: >
            NEXT_PUBLIC_BASE_FRONT_URL=${{ secrets.PRE_FRONT_URL }}
            NEXT_PUBLIC_BASE_BACK_URL=${{ secrets.BACK_URL }}/api
            NEXT_PUBLIC_BACK_DOMAIN=${{ secrets.BACK_URL }}
           